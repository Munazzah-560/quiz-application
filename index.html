<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="nextQuestion()">

    <div class="quiz-container">
        <h1>Quiz App</h1>
        <h1 id="timer">2:00</h1>
        
        <p id="ques"></p>

        <div class="option-wrapper">
            <input value="1" onclick="clicked()" type="radio" class="options" name="options" id="radio1">
            <label id="opt1" for="radio1"></label>
        </div>

        <div class="option-wrapper">
            <input value="2" onclick="clicked()" type="radio" class="options" name="options" id="radio2">
            <label id="opt2" for="radio2"></label>
        </div>

        <div class="option-wrapper">
            <input value="3" onclick="clicked()" type="radio" class="options" name="options" id="radio3">
            <label id="opt3" for="radio3"></label>
        </div>

        <button id="btn" disabled onclick="nextQuestion()">Next</button>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
